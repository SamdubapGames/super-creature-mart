<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>괴물 마트 — 텍스트 버전</title>
        <link rel="stylesheet" href="fullgame.css" />
    </head>
    <body>
        <img id="bg-layer" />
        <!-- ════════════════════════════════════
             씬 1: 시작 화면
             ════════════════════════════════════ -->
        <div id="scene-start" class="scene active">
            <h1 class="title">괴물 마트</h1>
            <p class="subtitle">먹고 살기 위해 나가야 한다</p>
            <button id="btn-start" class="btn-main">나가기</button>
        </div>

        <!-- ════════════════════════════════════
             씬 2: 길 화면
             ════════════════════════════════════ -->
        <div id="scene-path" class="scene">
            <!-- 경로 표시 -->
            <div id="path-route-display" class="info-box">경로 로딩중...</div>

            <!-- 현재 부위 (크게) -->
            <div class="path-stage">
                <div id="path-current-part"></div>
                <img id="monster-layer" src="" alt="" />
            </div>

            <!-- 메시지 -->
            <p id="path-message" class="message-box"></p>

            <!-- 아이템 버튼들 (동적 생성) -->
            <div class="button-bar" id="path-item-buttons"></div>

            <!-- 전진 버튼 -->
            <div class="button-bar">
                <button id="path-btn-walk" class="btn-action">
                    걸어가기 →
                </button>
            </div>

            <!-- 디버그: 스킵 -->
            <button id="path-btn-skip" class="debug-skip">
                [DEV] 길 스킵 →
            </button>
            <!-- 디버그: 길다음스텝으로 스킵 -->
            <button id="path-btn-dev-next-bg" class="debug-skip">
                [DEV] 배경만 다음 →
            </button>
            <!-- 디버그: 괴물부위 -->
            <button id="path-btn-dev-next-part" class="debug-skip">
                [DEV] 부위 다음 →
            </button>
            <!-- 디버그: 매칭 -->
            <button id="path-btn-dev-match-test" class="debug-skip">
                [DEV] 매칭 테스트
            </button>
        </div>

        <!-- ════════════════════════════════════
             씬 3: 상점 화면
             ════════════════════════════════════ -->
        <div id="scene-shop" class="scene">
            <h1 class="title" style="font-size: 20px; margin-bottom: 16px">
                🛒 톳 마트
            </h1>

            <!-- 예산 -->
            <div class="budget-area">
                <h3>예산: <span id="shop-budget-original"></span></h3>
                <h3 id="shop-remaining-display"></h3>
            </div>

            <!-- 메뉴 보기 버튼 -->
            <button
                id="shop-btn-show-menu"
                class="btn-main"
                style="margin-bottom: 16px"
            >
                마트 물건 리스트 보기
            </button>

            <!-- 메뉴판 -->
            <div id="shop-menu-display" class="info-box"></div>

            <!-- 담기 버튼들 (동적 생성) -->
            <div class="item-buttons" id="shop-item-buttons-container"></div>

            <!-- 메시지 -->
            <p id="shop-message" class="message-box"></p>

            <!-- 내가 구매한 -->
            <p id="shop-purchased-display" class="purchased-box"></p>

            <!-- 구매 완료 / 떠나기 -->
            <div class="button-bar">
                <button id="shop-btn-checkout" class="btn-checkout">
                    구매 완료
                </button>
                <button id="shop-btn-leave" class="btn-action">
                    마트 떠나기
                </button>
            </div>

            <!-- 영수증 -->
            <pre id="shop-receipt-display" class="receipt-box"></pre>

            <!-- 디버그: 스킵 -->
            <button id="shop-btn-skip" class="debug-skip">
                [DEV] 상점 스킵 →
            </button>
        </div>

        <!-- ════════════════════════════════════
             씬 4: 엔딩 화면
             ════════════════════════════════════ -->
        <div id="scene-ending" class="scene">
            <p id="ending-text" class="ending-text"></p>
            <button id="btn-restart" class="btn-main">다시 하기</button>
        </div>

        <!-- ════════════════════════════════════
             디버그 메뉴 (하단 고정)
             ════════════════════════════════════ -->
        <div id="debug-menu">
            <span>🛠 DEV</span>
            <button
                class="debug-btn btn-main"
                onclick="debugJump('start')"
                style="font-size: 12px; padding: 4px 10px"
            >
                시작
            </button>
            <button
                class="debug-btn btn-action"
                onclick="debugJump('path')"
                style="font-size: 12px; padding: 4px 10px"
            >
                길
            </button>
            <button
                class="debug-btn btn-checkout"
                onclick="debugJump('shop')"
                style="font-size: 12px; padding: 4px 10px"
            >
                상점
            </button>
            <button
                class="debug-btn btn-reset"
                onclick="debugJump('ending')"
                style="
                    font-size: 12px;
                    padding: 4px 10px;
                    display: inline-block;
                "
            >
                엔딩
            </button>
        </div>

        <!-- 스크립트 로드 순서 -->
        <script src="js/data.js"></script>
        <script src="js/path.js"></script>
        <script src="js/shop.js"></script>
        <script src="js/notebook.js"></script>
        <script src="js/scenes/clickPathScene.js"></script>
        <script src="js/scenes/clickShopScene.js"></script>
        <script src="js/visualLayer.js"></script>
        <script src="js/dragDrop.js"></script>
        <script src="js/visualWrappers.js"></script>
        <script src="js/audio.js"></script>

        <script src="fullgame.js"></script>
    </body>
</html>
