<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>괴물 마트</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <!-- ─────────────────────────────────────
    게임 컨테이너
    모든 레이어가 이 안에서 absolute로 겹침
    position: relative 가 기준점
  ───────────────────────────────────────── -->
        <div id="game-container">
            <!-- 레이어 1: 배경 사진 -->
            <img id="background" src="" alt="" />

            <!-- 레이어 2: 연기 효과 -->
            <canvas id="fx" width="800" height="600"></canvas>

            <!-- 레이어 3: 괴물 부위 -->
            <canvas id="monster" width="800" height="600"></canvas>

            <!-- 레이어 4: UI (모든 씬의 UI가 여기 들어감)
         개념: UI는 항상 가장 위에 있어야 클릭 가능
    -->
            <div id="ui-layer">
                <!-- ── 시작 화면 UI ── -->
                <div id="start-ui" class="ui-screen">
                    <h1 class="title">괴물 마트</h1>
                    <p class="subtitle">먹고 살기 위해 나가야 한다</p>
                    <button id="start-btn" class="btn-main">나가기</button>
                </div>

                <!-- ── 길 화면 UI ── -->
                <div id="path-ui" class="ui-screen hidden">
                    <!-- 체력 표시 -->
                    <div id="hp-display" class="hud-top-left"></div>

                    <!-- 공책 버튼 -->
                    <button id="notebook-btn" class="btn-sub">공책 보기</button>

                    <!-- 공책 팝업 -->
                    <div id="notebook-popup" class="popup hidden">
                        <div id="notebook-content"></div>
                        <button id="notebook-close" class="btn-sub">
                            닫기
                        </button>
                    </div>

                    <!-- 인벤토리 (드래그 가능한 아이템들) -->
                    <div id="inventory-bar">
                        <!-- JS가 gameState.player.inventory 읽어서 동적으로 생성 -->
                    </div>

                    <!-- 괴물 위에 드롭 존 -->
                    <div id="drop-zone" class="hidden"></div>

                    <!-- 결과 메시지 (맞음/틀림) -->
                    <div id="path-message" class="message hidden"></div>
                </div>

                <!-- ── 상점 화면 UI ── -->
                <div id="shop-ui" class="ui-screen hidden">
                    <h2 class="shop-title">마트</h2>

                    <!-- 예산 표시 -->
                    <div id="budget-display" class="hud-top-right"></div>

                    <div class="shop-layout">
                        <!-- 왼쪽: 상점 목록 -->
                        <div class="shop-left">
                            <h3>상품 목록</h3>
                            <div id="shop-list"></div>
                            <!-- 구매 버튼들은 JS가 shop-list 안에 동적으로 생성 -->
                        </div>

                        <!-- 오른쪽: 인벤토리 -->
                        <div class="shop-right">
                            <h3>인벤토리</h3>
                            <div id="inventory-display"></div>
                        </div>
                    </div>

                    <div id="shop-message" class="message"></div>
                    <button id="leave-btn" class="btn-main">마트 떠나기</button>
                </div>

                <!-- ── 엔딩 화면 UI ── -->
                <div id="ending-ui" class="ui-screen hidden">
                    <p id="ending-text" class="ending-text"></p>
                    <button id="restart-btn" class="btn-main">다시 하기</button>
                </div>
            </div>
            <!-- /ui-layer -->
        </div>
        <!-- /game-container -->

        <!-- 스크립트 로드 순서 = 의존 순서 -->
        <!-- 개념: 의존 순서대로 로드해야 함
     data.js가 없으면 engine.js가 DATA를 못 읽음
     state.js가 없으면 gameState를 못 씀
     씬 파일들은 SceneManager.register 전에 있어야 함 -->
        <script src="js/data.js"></script>
        <script src="js/state.js"></script>
        <script src="js/layers.js"></script>
        <script src="js/notebook.js"></script>
        <script src="js/path.js"></script>
        <script src="js/shop.js"></script>
        <script src="js/scenes/startScene.js"></script>
        <script src="js/scenes/pathScene.js"></script>
        <script src="js/scenes/shopScene.js"></script>
        <script src="js/scenes/endingScene.js"></script>
        <script src="js/engine.js"></script>
    </body>
</html>
