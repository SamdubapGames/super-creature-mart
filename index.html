<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>괴물마트</title>
        <link rel="stylesheet" href="fullgame.css" />
    </head>
    <body>
        <img id="bg-layer" />
        <!-- ════════════════════════════════════
             씬 0: 타이틀 화면 
             ════════════════════════════════════ -->
        <div id="scene-title" class="scene active">
            <h1 id="main-title">
                먼지속세상에서<br />괴물을피해마트를<br />다녀오는법
            </h1>
            <button id="btn-game-start" class="btn-main">마트 다녀오기</button>
        </div>

        <!-- ════════════════════════════════════
             씬 1: 벙커 내부 화면
             ════════════════════════════════════ -->
        <div id="scene-start" class="scene active">
            <div class="start-text">
                <p class="subtitle">
                    밖은.. 먼지 지옥이다.. 하지만 나는 배가 고프다...
                </p>
                <p class="subtitle">.... 마트에 가야겠다</p>
            </div>

            <button id="btn-start" class="btn-main">
                <audio
                    id="openDoorSound"
                    src="assets/soundEffect/openDoor.wav"
                ></audio
                ><b>밖으로 나가기</b>
            </button>
        </div>

        <!-- ════════════════════════════════════
             씬 2: 길 화면
             ════════════════════════════════════ -->
        <div id="scene-path" class="scene">
            <!-- 경로 표시 -->
            <!-- <div id="path-route-display" class="info-box">경로 로딩중...</div> -->
            <!-- 현재 부위 (크게) -->
            <button id="path-btn-enter" class="btn-main">마트 들어가기</button>
            <div class="path-stage" id="path-monster-area">
                <!-- 디버그: 스킵 -->
                <!-- <button id="path-btn-skip" class="debug-skip">
                    [DEV] 길 스킵 →
                </button> -->
                <!-- 드래그앤드롭 영역 -->
                <div id="path-current-part"></div>
                <!-- 몬스터 등장 시 이미지 -->
                <img id="monster-layer" src="" alt="" />
            </div>

            <!-- 메시지 -->
            <!-- <p id="path-message" class="message-box"></p> -->

            <div class="path-buttons-container" id="path-button-area">
                <!-- 아이템 버튼들 (동적 생성) -->
                <div class="button-bar" id="path-item-buttons">
                    <audio id="칼" src="assets/soundEffect/knife.wav"></audio>
                    <audio id="담배" src="assets/soundEffect/cigar.mp3"></audio>
                    <audio
                        id="레몬"
                        src="assets/soundEffect/lemonSqueeze.MP3"
                    ></audio>
                </div>

                <!-- 전진 버튼 -->
                <button id="path-btn-walk" class="btn-main">
                    <audio
                        id="walkSound"
                        src="assets/soundEffect/walk.wav"
                    ></audio>
                    걸어가기
                </button>
            </div>
        </div>

        <!-- ════════════════════════════════════
             씬 3: 상점 화면
             ════════════════════════════════════ -->
        <div id="scene-shop" class="scene">
            <h1 class="title">톳 마트에 오신 것 을 환영 합니 다</h1>

            <div class="shop-top">
                <div id="shop-notice">
                    <!-- 메시지 -->
                    <p id="shop-message" class="message-box"></p>
                </div>
                <button id="shop-btn-leave" class="btn-action">
                    <audio
                        id="shopLeaveSound"
                        src="assets/soundEffect/openDoor.wav"
                    ></audio>
                    마트 떠나기
                </button>
            </div>

            <div class="scene-shop-content">
                <!-- ======== 상점 관련 영역 ======== -->
                <div class="shop-area">
                    <!-- 메뉴 보기 버튼 -->
                    <button
                        id="shop-btn-show-menu"
                        class="btn-main"
                        style="margin-bottom: 16px"
                    >
                        마트 물건 리스트 보기
                    </button>

                    <!-- 메뉴판 -->
                    <div id="shop-menu-display" class="info-box"></div>

                    <!-- 담기 버튼들 (동적 생성) -->
                    <div
                        class="shop-item-buttons"
                        id="shop-item-buttons-container"
                    ></div>
                    <audio
                        id="shopItemSound"
                        src="assets/soundEffect/coin.wav"
                    ></audio>
                </div>

                <!-- ======== 플레이어 관련 영역 ======== -->
                <div class="player-area">
                    <!-- 예산 -->
                    <div class="budget-area">
                        <h3>
                            예산:
                            <span id="shop-budget-original">30,000원</span>
                        </h3>
                        <h3 id="shop-remaining-display"></h3>
                    </div>
                    <!-- 내가 구매한 -->
                    <p id="shop-purchased-display" class="purchased-box"></p>
                    <!-- 영수증 -->
                    <pre id="shop-receipt-display" class="receipt-box"></pre>
                    <!-- 구매 완료 / 떠나기 -->
                    <div class="button-bar">
                        <audio
                            id="shopCheckoutSound"
                            src="assets/soundEffect/receipt.wav"
                        ></audio>
                        <button id="shop-btn-checkout" class="btn-checkout">
                            구매 완료
                        </button>
                    </div>
                </div>
            </div>
            <!-- 디버그: 스킵 -->
            <!-- <button id="shop-btn-skip" class="debug-skip">
                [DEV] 상점 스킵 →
            </button> -->
        </div>

        <!-- ════════════════════════════════════
             씬 4: 엔딩 화면
             ════════════════════════════════════ -->
        <div id="scene-ending" class="scene">
            <p id="ending-text" class="subtitle"></p>
            <button id="btn-restart" class="btn-main">마트.. 다시 가기?</button>
        </div>

        <!-- ════════════════════════════════════
             디버그 메뉴 (하단 고정)
             ════════════════════════════════════ -->

        <!-- 스크립트 로드 순서 -->
        <script src="js/data.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/path.js"></script>
        <script src="js/shop.js"></script>
        <script src="js/notebook.js"></script>
        <script src="js/scenes/clickPathScene.js"></script>

        <script src="fullgame.js"></script>
